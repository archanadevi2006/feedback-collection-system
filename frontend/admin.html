<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f5f5;
}

.dashboard{
width:95%;
margin:20px auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header h1{
color:#333;
}

.logout{
width:150px;
background:red;
color:white;
border:none;
padding:10px;
cursor:pointer;
border-radius:5px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;
}

.card-box{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.card-box h3{
margin-bottom:10px;
color:#555;
}

.card-box h2{
color:#007bff;
}

.search-section{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-section input,
.search-section select{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

.search-section input{
flex:1;
}

.search-section button{
background:#007bff;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#007bff;
color:white;
}

.action-btn{
padding:8px 12px;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
margin:2px;
}

.edit{
background:orange;
}

.delete{
background:red;
}

canvas{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

</style>

</head>

<body>

<div class="dashboard">

<div class="header">

<h1>Feedback Admin Dashboard</h1>

<button
class="logout"
onclick="logout()">

Logout

</button>

</div>

<div class="cards">

<div class="card-box">

<h3>Total Feedback</h3>

<h2 id="totalFeedback">0</h2>

</div>

<div class="card-box">

<h3>Average Rating</h3>

<h2 id="avgRating">0</h2>

</div>

<div class="card-box">

<h3>5 Star</h3>

<h2 id="fiveStar">0</h2>

</div>

<div class="card-box">

<h3>1 Star</h3>

<h2 id="oneStar">0</h2>

</div>

</div>

<div class="search-section">

<input
type="text"
id="search"
placeholder="Search by Name"
onkeyup="filterFeedback()">

<select
id="ratingFilter"
onchange="filterFeedback()">

<option value="">All Ratings</option>

<option value="1">1 ⭐</option>

<option value="2">2 ⭐⭐</option>

<option value="3">3 ⭐⭐⭐</option>

<option value="4">4 ⭐⭐⭐⭐</option>

<option value="5">5 ⭐⭐⭐⭐⭐</option>

</select>

<button onclick="loadFeedback()">

Refresh

</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Rating</th>

<th>Comments</th>

<th>Action</th>

</tr>

</thead>

<tbody id="feedbackTable">

</tbody>

</table>

<br>

<canvas id="ratingChart"></canvas>

</div>

<script src="admin.js"></script>

</body>
</html>
