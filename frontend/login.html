<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-card{
            width:400px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 20px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#333;
        }

        .back-btn{
            background:#6c757d;
            margin-top:10px;
        }
    </style>

</head>

<body>

<div class="login-card">

<h2>Admin Login</h2>

<input
type="text"
id="username"
placeholder="Enter Username">

<br><br>

<input
type="password"
id="password"
placeholder="Enter Password">

<br><br>

<button onclick="login()">

Login

</button>

<button
class="back-btn"
onclick="window.location='index.html'">

Back

</button>

</div>

<script src="login.js"></script>

</body>

</html>
